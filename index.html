<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autorização de Crachá</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="no-print" id="form-container">
        <h2>Gerador de Autorização de Crachá</h2>
        <form id="cracha-form">
            <label for="matricula">Matrícula:</label>
            <input type="text" id="matricula" required placeholder="Ex: 021403">

            <label for="nome">Nome do Funcionário:</label>
            <input type="text" id="nome" required placeholder="Ex: TAINA BARROS VENTURA">

            <label for="funcao">Função:</label>
            <input type="text" id="funcao" required placeholder="Ex: MEDICA PEDIATRA">

            <label for="via">Via do Crachá:</label>
            <select id="via">
                <option value="1ª via">1ª via</option>
                <option value="2ª via">2ª via</option>
            </select>

            <button type="submit">Gerar Documento e Imprimir</button>
        </form>
    </div>

    <div id="print-area">
        <div class="header">
            <p id="data-atual">Volta Redonda, DD de Mês de YYYY.</p>
            <br>
            <h3 id="titulo-documento">Autorização para Confecção de Crachás 1ª via.</h3>
        </div>

        <table class="tabela-documento">
            <thead>
                <tr>
                    <th>Matricula</th>
                    <th>Nome</th>
                    <th>FUNCAO</th>
                    <th>Assinatura</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td id="out-matricula"></td>
                    <td id="out-nome"></td>
                    <td id="out-funcao"></td>
                    <td class="linha-assinatura"></td>
                </tr>
            </tbody>
        </table>

        <div class="footer">
            <p>Endereço: Rua General Nelson de Melo nº. 145 - São Geraldo - Volta Redonda /RJ</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
